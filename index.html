<!doctype html>
<html lang="en" data-color-scheme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Google Fonts — Space Grotesk (display) + JetBrains Mono (code/terminal) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />

    <!-- Set the color scheme before paint to avoid a theme flash. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('dp-theme')
          if (saved === 'light' || saved === 'dark') {
            document.documentElement.setAttribute('data-color-scheme', saved)
          }
        } catch (e) {}
      })()
    </script>

    <title>Client Portal · Digital Pampas</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
